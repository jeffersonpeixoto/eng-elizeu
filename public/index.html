<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#0f172a" />
  <meta name="description" content="Sistema de chamados de engenharia com PWA, PDF, quadro operacional e detalhes." />
  <title>Chamados de Engenharia • Completo</title>
 <link rel="stylesheet" href="styles.css">
  <link rel="manifest" href="manifest.json" />
   <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="supabase.js"></script>
<script src="app.js" defer></script>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.31/jspdf.plugin.autotable.min.js"></script>
</head>

<body>

<div class="app-shell">

  <div class="header">
    <h1>Chamados de Engenharia</h1>
    <div class="topbar-actions">
      <button id="installButton" class="btn btn-secondary hidden" type="button">Instalar aplicativo</button>
      <button class="btn btn-primary" onclick="carregarDados()">Atualizar dados</button>
    </div>
  </div>

  <div class="menu-grid">
    <button class="menu-btn active" onclick="switchView('dashboard', this)">Dashboard</button>
    <button class="menu-btn" onclick="switchView('novo', this)">Novo Chamado</button>
    <button class="menu-btn" onclick="switchView('lista', this)">Lista de Chamados</button>
    <button class="menu-btn" onclick="switchView('kanban', this)">Quadro Operacional</button>
  </div>

  <div class="dynamic-area">

    <!-- DASHBOARD -->
    <div id="dashboardView" class="view">
      <div class="metrics-grid">
        <div class="metric-card">Total <div id="metricTotal" class="metric-value">0</div></div>
        <div class="metric-card">Abertos <div id="metricAbertos" class="metric-value">0</div></div>
        <div class="metric-card">Andamento <div id="metricAndamento" class="metric-value">0</div></div>
        <div class="metric-card">Concluídos <div id="metricConcluidos" class="metric-value">0</div></div>
        <div class="metric-card">Críticos <div id="metricCriticos" class="metric-value">0</div></div>
      </div>
    </div>

    <!-- NOVO -->
    <div id="novoView" class="view hidden">
      <!-- (mantive tudo igual) -->
    </div>

    <!-- LISTA -->
    <div id="listaView" class="view hidden">

      <div class="card">
        <div class="section-header">
          <div>
            <span class="eyebrow">Operação</span>
            <h3>Lista de chamados</h3>
          </div>
        </div>

        <div id="ticketList" class="ticket-list"></div>
      </div>

      <!-- ❌ REMOVIDO ID DUPLICADO -->
      <!-- <div id="ticketList"></div> -->

    </div>

    <!-- KANBAN -->
    <div id="kanbanView" class="view hidden">
      <div class="card">

        <div class="kanban-grid">

          <div class="kanban-column">
            <div class="kanban-header">
              <span>Aberto</span>
              <strong id="kanbanCountAberto">0</strong>
            </div>
            <div id="kanbanAberto" class="kanban-list"></div>
          </div>

          <div class="kanban-column">
            <div class="kanban-header">
              <span>Em andamento</span>
              <strong id="kanbanCountAndamento">0</strong>
            </div>
            <div id="kanbanAndamento" class="kanban-list"></div>
          </div>

          <!-- ✅ CORRIGIDO -->
          <div class="kanban-column">
            <div class="kanban-header">
              <span>Pausado</span>
              <strong id="kanbanCountPausado">0</strong>
            </div>
            <div id="kanbanPausado" class="kanban-list"></div>
          </div>

          <div class="kanban-column">
            <div class="kanban-header">
              <span>Concluído</span>
              <strong id="kanbanCountConcluido">0</strong>
            </div>
            <div id="kanbanConcluido" class="kanban-list"></div>
          </div>

        </div>
      </div>
    </div>

  </div>
</div>

<!-- MODAL (mantido igual) -->
<dialog id="detailModal" class="detailModal">
  <div class="modal-header">
    <div>
      <h3>Detalhes do chamado</h3>
      <p id="modalTicketId"></p>
    </div>
    <button class="btn-close" onclick="fecharModal()">×</button>
  </div>

  <div class="modal-body">
    <div id="detailGrid"></div>

    <div class="field-group">
      <label>Descrição</label>
      <div id="modalDescricao"></div>
    </div>

    <img id="modalFoto" class="hidden" />
  </div>

  <div class="modal-footer">
    <button id="btnIniciar" class="btn iniciar" onclick="iniciarChamado()">▶️ Iniciar</button>
    <button id="btnPausar" class="btn pausar" onclick="pausarChamado()">⏸️ Pausar</button>
    <button id="btnRetomar" class="btn retomar" onclick="retomarChamado()">▶️ Retomar</button>
    <button id="btnFinalizar" class="btn finalizar" onclick="finalizarChamado()">✅ Finalizar</button>
  </div>
</dialog>

</body>
</html>
